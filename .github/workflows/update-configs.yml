name: Update Free Configs

on:
  schedule:
    - cron: "0 * * * *"   # هر ۱ ساعت یک‌بار اجرا می‌شه
  workflow_dispatch: {}       # امکان اجرای دستی از تب Actions

permissions:
  contents: write

jobs:
  update-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests telethon

      - name: Fetch and merge configs
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python fetch_configs.py

      - name: Commit and push if changed
        run: |
          git config user.name "ravvpn-bot"
          git config user.email "actions@users.noreply.github.com"
          git add RAVVPN2 RVVPN
          git diff --cached --quiet || git commit -m "🔄 Auto-update configs"
          git push
